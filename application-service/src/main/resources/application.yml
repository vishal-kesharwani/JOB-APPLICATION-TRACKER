server:
  port: 8081

spring:
  application:
    name: application-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:jobtracker}
    username: ${DB_USER:jobtrackeru}
    password: ${DB_PASSWORD:jobtracker1}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway migrations, not Hibernate auto-create
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- Actuator / Prometheus / Tracing ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # enables /actuator/health/liveness and /actuator/health/readiness
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: application-service
    distribution:
      percentiles-histogram:
        application_creation_latency: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}   # enable later when LGTM is wired
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    com.jobtracker: INFO
    org.apache.kafka: WARN
