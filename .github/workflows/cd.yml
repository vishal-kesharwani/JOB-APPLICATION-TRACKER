name: CD

# Build and push images to GHCR, then bump the image tags in the prod overlay.
# ArgoCD watches that overlay and rolls out the new version (GitOps).
on:
  push:
    branches: [main]
    # Documentation changes cannot alter an image, and rebuilding four services
    # to publish identical layers costs ~5 minutes per commit.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write      # to commit the image-tag bump back to the repo
  packages: write      # to push images to GHCR

# Serialise runs on a branch so two bump-manifests jobs never race to push the
# same file. Queued rather than cancelled, so every commit still gets images.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - application-service
          - notification-service
          - analytics-service
          - frontend
    steps:
      - uses: actions/checkout@v4

      # Required: without this, buildx falls back to the plain `docker` driver,
      # which fails against GHCR with "ERROR: failed to build: unknown blob".
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          # GHCR chokes on the provenance/SBOM attestation manifests buildx
          # attaches by default — disable them.
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest

  bump-manifests:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # Pin the tags and push, retrying against whatever main looks like now.
      #
      # This job runs after the image builds, which take minutes, so main has
      # often moved on by the time it pushes — a plain `git push` is rejected
      # non-fast-forward and the deploy commit is silently lost. Rather than
      # rebasing (two CD runs would conflict over the same kustomization.yaml),
      # each attempt resets to the current main and redoes the edit, which is
      # idempotent: the result depends only on github.sha, never on what the
      # working tree happened to contain.
      - name: Pin image tags to this commit and push
        env:
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            # FETCH_HEAD, not origin/$BRANCH: checkout clones shallow by default
            # and the remote-tracking ref is not reliably updated by this fetch.
            git fetch origin "$BRANCH"
            git reset --hard FETCH_HEAD

            ( cd infrastructure/kubernetes/overlays/prod
              for svc in application-service notification-service analytics-service frontend; do
                kustomize edit set image "${svc}=ghcr.io/${OWNER}/${svc}:${SHA}"
              done )

            git add infrastructure/kubernetes/overlays/prod/kustomization.yaml
            if git diff --cached --quiet; then
              echo "Tags already pinned to ${SHA} — nothing to commit."
              exit 0
            fi

            git commit -m "ci: deploy ${SHA}"
            if git push origin "HEAD:$BRANCH"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt} — $BRANCH moved. Retrying."
          done

          echo "::error::Could not push the image-tag bump after 5 attempts."
          exit 1
