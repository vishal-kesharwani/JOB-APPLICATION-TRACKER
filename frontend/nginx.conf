# Serves the built React app and reverse-proxies the API to the three backend
# services. Because the browser only ever talks to this one origin, no CORS
# configuration is needed on the Spring services — this mirrors the ALB Ingress
# used in the Kubernetes prod overlay.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # --- API routing ---------------------------------------------------------
    location /api/v1/applications {
        proxy_pass http://application-service:8081;
        include /etc/nginx/conf.d/proxy_common.inc;
    }

    location /api/v1/reminders {
        proxy_pass http://notification-service:8082;
        include /etc/nginx/conf.d/proxy_common.inc;
    }

    location /api/v1/analytics {
        proxy_pass http://analytics-service:8083;
        include /etc/nginx/conf.d/proxy_common.inc;
    }

    # --- Static assets -------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes (/applications, /reminders) must serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
