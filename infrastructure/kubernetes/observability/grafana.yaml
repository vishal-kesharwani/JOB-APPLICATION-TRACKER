# Grafana.
#
# Only the Prometheus datasource is provisioned here — Loki and Tempo are not
# deployed to the cluster, and pointing a datasource at a Service that does not
# exist just produces a broken panel. They remain part of the Compose stack.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: jobtracker
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          httpMethod: POST
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: jobtracker
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: jobtracker
        orgId: 1
        folder: JobTracker
        type: file
        disableDeletion: false
        updateIntervalSeconds: 15
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: jobtracker
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: jobtracker
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            # Demo credentials, same as the Compose stack. Fine for a local
            # cluster; a real deployment would source these from a Secret.
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
          # Same reasoning as the Java services: provisioning datasources and
          # dashboards on a contended node can take minutes, and without a
          # startup probe liveness kills Grafana mid-boot in a loop.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        # Created from the existing dashboard JSON with:
        #   kubectl -n jobtracker create configmap grafana-dashboards \
        #     --from-file=observability/grafana/dashboards/
        # Marked optional so Grafana still starts if it has not been created.
        - name: dashboards
          configMap:
            name: grafana-dashboards
            optional: true
        - name: data
          emptyDir: {}
