# Local Kind cluster.
#   kind create cluster --config kind-cluster.yaml
#
# Single-node by default: Kafka + PostgreSQL + Redis + 4 app pods is already a
# heavy workload for a laptop, and multi-node adds ~1 GB overhead per extra node
# without changing anything you can demonstrate (probes, HPA, self-healing and
# rescheduling all work fine on one node).
#
# If you have 12 GB+ free for Docker, uncomment the workers below to show pods
# being scheduled across nodes.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: jobtracker
nodes:
  - role: control-plane
  # - role: worker
  # - role: worker
