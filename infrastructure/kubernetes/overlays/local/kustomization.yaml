apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local Kind cluster: images are loaded into the Kind node with
#   kind load docker-image application-service:latest ...
# so imagePullPolicy must not force a registry pull.
resources:
  - ../../base

images:
  - name: application-service
    newTag: latest
  - name: notification-service
    newTag: latest
  - name: analytics-service
    newTag: latest

patches:
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=jobtracker"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
