apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local Kind overlay.
#
# Images are loaded into the Kind node with `kind load docker-image`, so they must
# never be pulled from a registry (imagePullPolicy: IfNotPresent).
#
# This overlay also trims replicas and resource requests so the whole stack fits
# on a laptop (~4.5 GB allocated to Docker). The prod overlay keeps the full
# sizing — that separation is the point of having overlays.
resources:
  - ../../base

images:
  - name: application-service
    newTag: latest
  - name: notification-service
    newTag: latest
  - name: analytics-service
    newTag: latest
  - name: frontend
    newTag: latest

replicas:
  - name: application-service
    count: 1
  - name: frontend
    count: 1

patches:
  # Never pull — images are side-loaded into the node.
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=jobtracker"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent

  # --- Trim resource requests to fit a laptop -----------------------------
  #
  # CPU requests are 250m rather than the 75-100m these pods would "fit" in.
  # HPA utilisation is measured against the request, and an idle Spring Boot
  # JVM sits around 110-130m: with a 75m request that is 150%+ of target, so
  # the autoscaler scales out at rest and never scales back. Requests must
  # reflect actual idle cost, or the HPA is measuring against a fiction.
  - target:
      kind: Deployment
      name: application-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: "250m", memory: "256Mi" }
          limits: { cpu: "1", memory: "512Mi" }

  - target:
      kind: Deployment
      name: notification-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: "250m", memory: "224Mi" }
          limits: { cpu: "500m", memory: "448Mi" }

  - target:
      kind: Deployment
      name: analytics-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: "250m", memory: "224Mi" }
          limits: { cpu: "500m", memory: "448Mi" }

  - target:
      kind: StatefulSet
      name: kafka
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: "150m", memory: "384Mi" }
          limits: { cpu: "1", memory: "768Mi" }

  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: "75m", memory: "128Mi" }
          limits: { cpu: "500m", memory: "256Mi" }

  # HPA can still scale application-service, just within a smaller ceiling.
  - target:
      kind: HorizontalPodAutoscaler
      name: application-service
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # The frontend HPA's minReplicas of 2 contradicted the single replica this
  # overlay asks for, so the two controllers pulled in opposite directions
  # permanently. One replica of nginx is plenty locally.
  - target:
      kind: HorizontalPodAutoscaler
      name: frontend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
