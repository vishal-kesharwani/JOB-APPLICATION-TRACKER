apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production (EKS) overlay. Images come from GHCR; the CD pipeline / ArgoCD image
# updater rewrites the tags. Replace GHCR_OWNER with your GitHub org/user.
resources:
- ../../base
- ingress.yaml

images:
- name: analytics-service
  newName: ghcr.io/vishal-kesharwani/analytics-service
  newTag: 9ebd76a5ade05309b25af580d65b157c32710528
- name: application-service
  newName: ghcr.io/vishal-kesharwani/application-service
  newTag: 9ebd76a5ade05309b25af580d65b157c32710528
- name: frontend
  newName: ghcr.io/vishal-kesharwani/frontend
  newTag: 9ebd76a5ade05309b25af580d65b157c32710528
- name: notification-service
  newName: ghcr.io/vishal-kesharwani/notification-service
  newTag: 9ebd76a5ade05309b25af580d65b157c32710528

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: application-service
