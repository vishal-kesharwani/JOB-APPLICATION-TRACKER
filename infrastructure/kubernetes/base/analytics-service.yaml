apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service-config
  namespace: jobtracker
data:
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  TRACING_SAMPLING_PROBABILITY: "0.1"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: jobtracker
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: jobtracker
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: /actuator/prometheus
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: analytics-service-config
          # See application-service.yaml — startup probe gates liveness so a slow
          # JVM boot on a contended node isn't mistaken for a hung process.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests: { cpu: "200m", memory: "384Mi" }
            limits: { cpu: "750m", memory: "640Mi" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service
  namespace: jobtracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
