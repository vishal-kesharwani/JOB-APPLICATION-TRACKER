# ArgoCD Application — GitOps deployment of the JobTracker stack.
# Apply once (kubectl apply -f) against a cluster that has ArgoCD installed;
# thereafter ArgoCD keeps the cluster in sync with the prod overlay in Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jobtracker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vishal-kesharwani/JOB-APPLICATION-TRACKER.git
    targetRevision: main
    # The local overlay, not prod: the prod overlay pulls images from GHCR, and
    # a Kind node has no registry pull secret (and, here, no working route to a
    # registry at all). Pointing a local cluster at prod produces a permanently
    # degraded app that proves nothing about GitOps.
    path: infrastructure/kubernetes/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: jobtracker
  # Deployments here are scaled by a HorizontalPodAutoscaler, so their replica
  # count is owned by the cluster at runtime, not by Git. Without this, ArgoCD
  # and the HPA fight forever: the HPA scales up, selfHeal reverts to the value
  # in Git, the HPA scales up again, and the app never leaves OutOfSync.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
